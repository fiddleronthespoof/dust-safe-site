{{ define "main" }}
<article>
  <h1>{{ .Title }}</h1>
  {{ with .Params.description }}<p class="muted">{{ . }}</p>{{ end }}
  {{ .Content }}

  <section style="margin-top: 48px; padding-top: 24px; border-top: 1px solid #eee;">
    <h3>Related tasks</h3>
    <ul>
      {{ $current := . }}
      {{ range first 4 (where site.RegularPages "Section" "tasks") }}
        {{ if ne .Permalink $current.Permalink }}
          <li>
            <a href="{{ .RelPermalink }}">{{ .Title }}</a>
          </li>
        {{ end }}
      {{ end }}
    </ul>
  </section>
</article>
{{ end }}
